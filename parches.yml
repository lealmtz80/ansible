---
- name: Patch, reboot and verufy all mounted filesystem
  hosts: PARCHES

#  vars:
#    report_path: "./patching"
#    report_filename: "host_report_{{ lookup('pipe', 'date +%Y%m%d%H%M') }}.csv"

  tasks:

#    - name: Ensure report directory exists
#      file:
#        path: "{{ report_path }}"
#        state: directory
#        mode: 0755
#        owner: cstiadm
#      delegate_to: localhost
#      run_once: true
#
    - name: Ensure all filesystems in fstab are mounted
      command: mount -a
      register: mount_result
      changed_when: false

    - name: Obtein antes.sh
      command: bash /root/antes.sh
      ignore_errors: true

    - name: check for available updates
      ansible.builtin.dnf:
        list: updates
      register: available_updates

    - name: Display update count
      ansible.builtin.debug:
        msg: "{{ available_updates.results | length }} updates available"

    - name: Record installed kernel version
      ansible.builtin.command: uname -r
      register: pre_patch_kernel
      changed_when: false

    - name: Apply all updates
      ansible.builtin.dnf:
        name: "*"
        state: latest
      register: patch_result

    - name: Check if reboot is needed
      ansible.builtin.command: needs-restarting -r
      register: reboot_check
      failed_when: false
      changed_when: reboot_check.rc == 1

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 250
      when: reboot_check.rc == 1

    - name: Wait for system to be ready
      ansible.builtin.wait_for_connection:
        delay: 30
        timeout: 300
      when: reboot_check.rc == 1

